
    {% for item in incomes %}
    <tr>
        <td>{{ forloop.counter }}</td>
        <td>{{ item.title }}</td>
        <td>{{ item.source }}</td>
        <td>{{ item.amount }}</td>
        <td>{{ item.currency }}</td>
        <td>{{ item.date }}</td>
        <td>{{ item.note|default:"-" }}</td>
        <td>
            <a href="{% url 'finance:income_update' item.id %}" class="btn btn-sm btn-warning">
                Edit
            </a>

            <a href="{% url 'finance:income_delete' item.id %}" 
            class="btn btn-sm btn-danger"
            onclick="return confirm('Are you sure to delete?')">
                Delete
            </a>
        </td>
    </tr>
    {% empty %}
    <tr>
        <td colspan="7" class="text-center">No income records found.</td>
    </tr>
    {% endfor %}
