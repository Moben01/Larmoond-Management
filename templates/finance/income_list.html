<script>
function fetchData() {
    let search = document.getElementById('search').value;
    let source = document.getElementById('source').value;
    let currency = document.getElementById('currency').value;
    let from_date = document.getElementById('from_date').value;
    let to_date = document.getElementById('to_date').value;

    fetch(`?search=${search}&source=${source}&currency=${currency}&from_date=${from_date}&to_date=${to_date}`, {
        headers: {
            'X-Requested-With': 'XMLHttpRequest'
        }
    })
    .then(res => res.json())
    .then(data => {
        document.getElementById('table-body').innerHTML = data.html;
    });
}

// events
document.querySelectorAll('#search, #source, #currency, #from_date, #to_date')
.forEach(el => {
    el.addEventListener('keyup', fetchData);
    el.addEventListener('change', fetchData);
});
</script>
<script>
function printPage() {
    window.print();
}
</script>

<style>
@media print {
    .btn, .card-header, .page-header {
        display: none !important;
    }
}
</style>
