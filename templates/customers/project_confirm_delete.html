{% extends 'base.html' %}
{% load static %}

{% block title %}Delete Project{% endblock %}

{% block content %}
<div class="page-wrapper">
    <div class="content container-fluid">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-body text-center p-5">
                        <div class="mb-4">
                            <i class="la la-trash-alt fa-4x text-danger"></i>
                        </div>
                        <h3>Are you sure?</h3>
                        <p>You want to delete project <strong>"{{ project.project_name }}"</strong>?</p>
                        <p class="text-muted">Project ID: {{ project.project_id }}</p>
                        <p class="text-danger">This action cannot be undone!</p>
                        
                        <form method="post">
                            {% csrf_token %}
                            <div class="d-flex gap-2 justify-content-center mt-4">
                                <a href="{% url 'customers:project_detail' project.pk %}" class="btn btn-secondary">Cancel</a>
                                <button type="submit" class="btn btn-danger">Yes, Delete</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
